# Configurações do Bolha
app:
  name: Bolha
  version: 0.1.0
  language: pt-BR
  debug_mode: true  # loga cada etapa no terminal

paths:
  data_dir: data
  logs_dir: data/logs
  memory_dir: data/memory
  models_dir: data/models
  sounds_dir: data/sounds
  db_path: data/logs/bolha.db

logging:
  level: DEBUG  # DEBUG, INFO, WARNING, ERROR
  file: data/logs/bolha.log
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

voice:
  sample_rate: 16000
  channels: 1
  audio:
    chunk_samples: 1280      # 80ms @ 16kHz — tamanho esperado pelo openWakeWord
    queue_maxsize: 200       # frames em buffer antes de descartar
    input_device: null       # null = device padrão do sistema
  wake_word:
    name: bolha
    model_path: null         # caminho .onnx do modelo custom (treinar na etapa "Bolha")
    fallback_model: hey_jarvis  # usado enquanto não temos modelo próprio
    inference_framework: onnx  # 'onnx' no Windows (tflite-runtime não tem wheel oficial)
    threshold: 0.5
    cooldown_seconds: 2.0    # ignora detecções repetidas neste intervalo
  command:
    duration_seconds: 5      # tempo de gravação do comando após o wake word
  earcons:
    wake_freq_hz: 880
    wake_duration_ms: 120
    wake_amplitude: 0.2
    processing_freq_hz: 440    # tom mais grave = Whisper rodando
    processing_duration_ms: 90
    processing_amplitude: 0.18
  stt:
    model: base              # tiny, base, small, medium, large
    device: cuda             # cuda ou cpu (cuda exige cuBLAS/cuDNN)
    compute_type: auto       # auto | float16 | int8_float16 | int8 | float32
    language: pt             # pt travado evita alucinação em áudios curtos. use "auto" pra PT+EN
    beam_size: 5
  tts:
    voice: pt_BR-faber-medium  # PT-BR oficial do Piper só tem voz masculina
    model_path: data/models/pt_BR-faber-medium.onnx
    config_path: data/models/pt_BR-faber-medium.onnx.json
    speaker_id: null
    use_cuda: false            # true só se onnxruntime-gpu estiver instalado
  vad:
    threshold: 0.5
    min_silence_ms: 500
    min_speech_ms: 250         # descarta "voz" menor que isso (provável ruído)

brain:
  provider: ollama        # ollama | anthropic (futuro)
  model: phi3:mini
  host: http://localhost:11434
  format: json
  temperature: 0.2
  max_history: 10         # sliding window de interações

executor:
  dry_run: false
  # aliases PT-BR → nome do executável (Windows)
  app_aliases:
    bloco de notas: notepad
    notepad: notepad
    calculadora: calc
    calc: calc
    explorador: explorer
    explorador de arquivos: explorer
    explorer: explorer
    paint: mspaint
    terminal: wt
    cmd: cmd
    prompt de comando: cmd
    powershell: powershell
    gerenciador de tarefas: taskmgr
    configurações: "ms-settings:"
    loja: "ms-windows-store:"
    word: winword
    excel: excel
    powerpoint: powerpnt
    chrome: chrome
    firefox: firefox
    edge: msedge
    spotify: spotify
    discord: discord
    vscode: code
    visual studio code: code
    steam: steam
    vlc: vlc
  # comandos de sistema (volume, info, shutdown)
  system:
    volume_step: 10      # passo em % usado quando o LLM não manda 'value'
    disk_path: "C:/"     # drive consultado pelo system_info
  # timeouts por tipo de ação (segundos)
  timeouts:
    default: 10
    file_operation: 15
    app_launch: 20
    browser: 15
    system_cmd: 10
    screen_control: 8

security:
  require_confirmation: true
  rate_limit:
    max_actions: 10
    per_seconds: 60
  protected_paths:
    - "C:/Windows"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
  blocked_commands:
    - format
    - diskpart
    - "reg delete"
  destructive_actions:
    - file_delete
    - folder_delete
    - file_move
    - system_shutdown
    - registry_edit

shutdown:
  timeout_seconds: 5      # tempo máximo pra graceful shutdown
